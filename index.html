<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Pet</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>My Virtual Pet</h1>
        </header>

        <main class="main-card glass-panel">
            <div class="pet-display" id="pet-canvas-container">
                <!-- Three.js Canvas will be injected here -->
            </div>

            <div class="stats-container">
                <div class="stat-row">
                    <span class="stat-label">Hunger</span>
                    <div class="progress-bar-container">
                        <div id="bar-hunger" class="progress-bar fill-hunger" style="width: 100%"></div>
                    </div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Happiness</span>
                    <div class="progress-bar-container">
                        <div id="bar-happiness" class="progress-bar fill-happiness" style="width: 100%"></div>
                    </div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Energy</span>
                    <div class="progress-bar-container">
                        <div id="bar-energy" class="progress-bar fill-energy" style="width: 100%"></div>
                    </div>
                </div>
            </div>

            <div class="actions-container">
                <button id="btn-feed" class="action-btn btn-feed">
                    <span class="icon">🍖</span> Feed
                </button>
                <button id="btn-play" class="action-btn btn-play">
                    <span class="icon">🎾</span> Play
                </button>
                <button id="btn-sleep" class="action-btn btn-sleep">
                    <span class="icon">💤</span> Sleep
                </button>
                <button id="btn-bone" class="action-btn btn-bone">
                    <span class="icon">🦴</span> Bone
                </button>
            </div>

            <!-- AI Chat Console -->
            <div class="chat-console">
                <div class="chat-header">
                    <h4>AI Chat with Pet <span class="active-dot" id="active-dot"></span></h4>
                    <button id="btn-toggle-key" class="icon-btn-text">🔑 Config Key</button>
                </div>
                
                <!-- API Key Config Area (Collapsible) -->
                <div id="key-config-container" class="key-config-container hidden">
                    <p class="config-desc">Google AI StudioのAPIキーを入力してください（キーはローカルブラウザにのみ保存されます）:</p>
                    <div class="key-input-row">
                        <input type="password" id="input-api-key" placeholder="AI Studio API Key...">
                        <button id="btn-save-key">Save</button>
                    </div>
                    <a href="https://aistudio.google.com/" target="_blank" class="key-link">🔑 APIキーを無料で取得する (Google AI Studio) &rarr;</a>
                </div>

                <!-- Spontaneous thought bubble -->
                <div id="pet-thought-bubble" class="thought-bubble hidden">
                    <p id="thought-text"></p>
                </div>

                <!-- Chat History Log -->
                <div class="chat-log" id="chat-log">
                    <div class="chat-message pet">
                        <div class="message-content">ワンワン！ぼくとお話ししようワン！🐾</div>
                    </div>
                </div>

                <!-- Typing / Thinking Indicator -->
                <div id="thinking-indicator" class="thinking-indicator hidden">
                    <span></span><span></span><span></span>
                </div>

                <!-- Chat Input Row -->
                <form id="chat-form" class="chat-input-row">
                    <button type="button" id="btn-mic" class="mic-btn" title="音声入力">🎙️</button>
                    <input type="text" id="chat-input" placeholder="話しかけてみてね..." autocomplete="off">
                    <button type="button" id="btn-tts" class="tts-btn active" title="音声読み上げ">🔊</button>
                    <button type="submit" id="btn-send" class="send-btn">💬</button>
                </form>

                <!-- Quick Prompt Suggestions -->
                <div class="quick-prompts">
                    <button type="button" class="prompt-chip" data-prompt="お手！">👋 お手！</button>
                    <button type="button" class="prompt-chip" data-prompt="待て！">✨ 待て！</button>
                    <button type="button" class="prompt-chip" data-prompt="骨を投げて！">🦴 骨投げ</button>
                    <button type="button" class="prompt-chip" data-prompt="大きくなーれ！">🦁 巨大化！</button>
                    <button type="button" class="prompt-chip" data-prompt="ちっちゃくなって！">🐭 小型化！</button>
                </div>
            </div>

            <!-- Personality Panel -->
            <div class="customizer-panel">
                <h4>Pet Personality</h4>
                <div class="slider-group" style="margin-bottom: 10px;">
                    <label style="margin-bottom: 5px;">Personality:</label>
                    <select id="select-personality" style="padding: 8px; border-radius: 8px; border: 1px solid var(--panel-border); background: rgba(255,255,255,0.8); font-family: inherit; font-size: 0.95rem; color: var(--text-main); outline: none; cursor: pointer; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);">
                        <option value="normal">Normal (普通)</option>
                        <option value="energetic">Energetic (元気)</option>
                        <option value="lazy">Lazy (のんびり)</option>
                        <option value="glutton">Glutton (くいしんぼう)</option>
                    </select>
                </div>
            </div>

            <!-- Customization Panel -->
            <div class="customizer-panel">
                <h4>Customize Pet Shape</h4>

                <div class="slider-group">
                    <label>Body Length: <span id="val-body">1.0</span></label>
                    <input type="range" id="slider-body" min="0.5" max="1.5" step="0.1" value="1.0">
                </div>

                <div class="slider-group">
                    <label>Head Size: <span id="val-head">1.0</span></label>
                    <input type="range" id="slider-head" min="0.7" max="1.3" step="0.1" value="1.0">
                </div>

                <div class="slider-group">
                    <label>Ear Length: <span id="val-ears">1.0</span></label>
                    <input type="range" id="slider-ears" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>

                <div class="slider-group">
                    <label>Leg Length: <span id="val-legs">1.0</span></label>
                    <input type="range" id="slider-legs" min="0.5" max="1.8" step="0.1" value="1.0">
                </div>
            </div>
        </main>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="pet3d.js"></script>
    <script src="app.js"></script>
</body>

</html>
