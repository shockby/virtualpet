<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Pet</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>My Virtual Pet</h1>
        </header>

        <main class="main-card glass-panel">
            <div class="pet-display" id="pet-canvas-container">
                <!-- Three.js Canvas will be injected here -->
            </div>

            <div class="stats-container">
                <div class="stat-row">
                    <span class="stat-label">Hunger</span>
                    <div class="progress-bar-container">
                        <div id="bar-hunger" class="progress-bar fill-hunger" style="width: 100%"></div>
                    </div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Happiness</span>
                    <div class="progress-bar-container">
                        <div id="bar-happiness" class="progress-bar fill-happiness" style="width: 100%"></div>
                    </div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Energy</span>
                    <div class="progress-bar-container">
                        <div id="bar-energy" class="progress-bar fill-energy" style="width: 100%"></div>
                    </div>
                </div>
            </div>

            <div class="actions-container">
                <button id="btn-feed" class="action-btn btn-feed">
                    <span class="icon">🍖</span> Feed
                </button>
                <button id="btn-play" class="action-btn btn-play">
                    <span class="icon">🎾</span> Play
                </button>
                <button id="btn-sleep" class="action-btn btn-sleep">
                    <span class="icon">💤</span> Sleep
                </button>
            </div>

            <!-- Customization Panel -->
            <div class="customizer-panel">
                <h4>Customize Pet Shape</h4>

                <div class="slider-group">
                    <label>Body Length: <span id="val-body">1.0</span></label>
                    <input type="range" id="slider-body" min="0.5" max="1.5" step="0.1" value="1.0">
                </div>

                <div class="slider-group">
                    <label>Head Size: <span id="val-head">1.0</span></label>
                    <input type="range" id="slider-head" min="0.7" max="1.3" step="0.1" value="1.0">
                </div>

                <div class="slider-group">
                    <label>Ear Length: <span id="val-ears">1.0</span></label>
                    <input type="range" id="slider-ears" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>

                <div class="slider-group">
                    <label>Leg Length: <span id="val-legs">1.0</span></label>
                    <input type="range" id="slider-legs" min="0.5" max="1.8" step="0.1" value="1.0">
                </div>
            </div>
        </main>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="pet3d.js"></script>
    <script src="app.js"></script>
</body>

</html>
